services:
  postgres:
    image: ${POSTGRES_IMAGE:-docker.m.daocloud.io/pgvector/pgvector:pg16}
    container_name: feishu-kb-postgres
    environment:
      POSTGRES_USER: feishu_kb
      POSTGRES_PASSWORD: feishu_kb_password
      POSTGRES_DB: feishu_kb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init_extensions.sql:/docker-entrypoint-initdb.d/001_init_extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feishu_kb -d feishu_kb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-docker.m.daocloud.io/library/redis:7.2-alpine}
    container_name: feishu-kb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
